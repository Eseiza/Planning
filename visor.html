<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Obras · Visor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-lines"></div>

    <!-- NAV PRINCIPAL -->
    <nav class="nav-main">
        <div class="nav-left">
            <img src="https://www.romeropanificados.com.ar/wp-content/uploads/2023/01/Recurso-8.png" class="nav-logo">
        </div>
        <div class="nav-center">
            <button id="btnEstados" class="active" onclick="mostrarVista('estados')">Estados</button>
            <button id="btnCalendario" onclick="mostrarVista('calendario')">Calendario</button>
        </div>
        <div class="nav-right">
            <span id="usuarioActual"></span>
            <button onclick="logout()">Salir</button>
        </div>
    </nav>

    <!-- NAV SECUNDARIO -->
    <nav class="nav-sub">
        <button class="sub-tab active" onclick="filtrarEstados('todas')" id="subTodas">Todas</button>
        <button class="sub-tab" onclick="filtrarEstados('Pendiente')" id="subPendiente">🟡 Pendientes</button>
        <button class="sub-tab" onclick="filtrarEstados('En progreso')" id="subProgreso">🔵 En progreso</button>
        <button class="sub-tab" onclick="filtrarEstados('Finalizada')" id="subFinalizada">🟢 Finalizadas</button>
        <button class="sub-tab" onclick="filtrarEstados('Demorada')" id="subDemorada">🔴 Demoradas</button>
        <button class="sub-tab" onclick="togglePanel('lista')" id="subLista">Lista</button>
        <button class="sub-tab" onclick="togglePanel('notif')" id="subNotif">
            🔔 <span class="badge empty" id="badge-notif">0</span>
        </button>
    </nav>

    <!-- ESTADOS -->
    <section id="vista-estados" class="vista">
        <div class="estado-container">
            <div class="estado-card"><h3>🟡 Pendientes</h3><div id="pendientes"></div></div>
            <div class="estado-card"><h3>🔵 En progreso</h3><div id="progreso"></div></div>
            <div class="estado-card"><h3>🟢 Finalizadas</h3><div id="finalizadas"></div></div>
            <div class="estado-card"><h3>🔴 Demoradas</h3><div id="demoradas"></div></div>
        </div>
    </section>
    
    <!-- CALENDARIO -->
    <section id="vista-calendario" class="vista hidden">
        <div class="calendar-card">
            <div id="calendar"></div>
        </div>
    </section>

    <!-- PANEL OVERLAY -->
    <div id="panel-overlay" class="panel-overlay" style="display:none" onclick="cerrarPaneles()"></div>

    <!-- PANEL LISTA -->
    <div id="panel-lista" class="panel-dropdown">
        <div class="panel-header">Todas las tareas <span>más recientes primero</span></div>
        <div id="panel-lista-body"></div>
    </div>

    <!-- PANEL NOTIFICACIONES -->
    <div id="panel-notif" class="panel-dropdown">
        <div class="panel-header">Próximos 5 días <span>inicio estimado</span></div>
        <div id="panel-notif-body"></div>
    </div>

    <!-- MODAL EDICIÓN -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo"></h3>
                <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
            </div>
            <p id="modal-descripcion" class="modal-desc"></p>
            <input type="hidden" id="modal-id">
            <label>Inicio real</label>
            <input type="date" id="modal-inicioReal">
            <label>Fin real</label>
            <input type="date" id="modal-finReal">
            <label>Estado</label>
            <select id="modal-estado">
                <option>Pendiente</option>
                <option>En progreso</option>
                <option>Finalizada</option>
                <option>Demorada</option>
            </select>
            <button onclick="guardarEdicion()">Guardar cambios</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="planner.js"></script>
</body>
</html>
