<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Planner Obras Romero </title>
    <link rel="stylesheet" href="style.css">
    <!-- FULLCALENDAR -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"rel="stylesheet">
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <div class="nav-left">
            <img src="https://www.romeropanificados.com.ar/wp-content/uploads/2023/01/Recurso-8.png"class="nav-logo">
        </div>
        <div class="nav-center">
            <button id="btnCarga">Cargar</button>
            <button id="btnEstados">Estados</button>
            <button id="btnCalendario">Calendario</button>
        </div>
        <div class="nav-right">
            <span id="usuarioActual"></span>
            <button onclick="logout()">Salir</button>
        </div>
    </nav>
    <!-- CARGAR -->
    <section id="vista-cargar"class="vista">
        <div class="card">
            <h2>Nueva Tarea</h2>
<input type="text"id="sector"placeholder="Sector">
            <input type="text"id="equipo"placeholder="Equipo">
            <textarea id="descripcion"placeholder="Descripción"></textarea>
            <label>Inicio estimado</label>
            <input type="date"id="inicioEst">
            <label>Fin estimado</label>
            <input type="date"id="finEst">
            <label>Inicio real</label>
            <input type="date"id="inicioReal">
            <label>Fin real</label>
            <input type="date"id="finReal">
            <select id="estado"><option>Pendiente</option><option>En progreso</option><option>Finalizada</option><option>Demorada</option></select>
            <button onclick="guardarTarea()">Guardar</button>
</div>
</section>
    <!-- ESTADOS -->
<section id="vista-estados"class="vista hidden">
        <div class="estado-container">
            <div class="estado-card">
                <h3>🟡 Pendientes</h3>
                <div id="pendientes"></div>
            </div>
            <div class="estado-card">
                <h3>🔵 En progreso</h3>
                <div id="progreso"></div>
            </div>
            <div class="estado-card">
                <h3>🟢 Finalizadas</h3>
                <div id="finalizadas"></div>
            </div>
            <div class="estado-card">
                <h3>🔴 Demoradas</h3>
                <div id="demoradas"></div>
            </div>
        </div>
    </section>
    <!-- CALENDARIO -->
    <section id="vista-calendario"class="vista hidden">
        <div class="calendar-card">
            <div id="calendar"></div>
        </div>
    </section>
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <!-- FULLCALENDAR -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <!-- PLANNER -->
    <script src="planner.html"></script>
</body>
</html>
